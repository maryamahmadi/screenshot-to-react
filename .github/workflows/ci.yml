name: CI

on:
  push:
    branches: [main]
  pull_request:

# Everything runs in mock mode: no ANTHROPIC_API_KEY is provided, so the
# provider adapter falls back to the deterministic mock generator.
jobs:
  test:
    runs-on: ubuntu-latest
    # Supabase config is injected from repository variables. These publishable
    # values ship in the client bundle anyway, so they live as plain variables
    # rather than secrets; this just keeps project identifiers out of source.
    # The actual secret key is NOT set here; admin/share-page tests that need it
    # will read it from GitHub Secrets when added later.
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        # --maxsockets works around a known npm/agent-base bug that crashes
        # `npm ci` with "Exit handler never called!" on GitHub runners.
        # See https://github.com/npm/cli/issues/9386
        run: npm ci --maxsockets 1000

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit and component tests
        run: npm test

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: End-to-end tests
        run: npm run test:e2e
